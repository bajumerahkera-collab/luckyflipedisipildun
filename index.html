<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup Lucky Flip 2026</title>
 
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
 
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
 
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    /* 🚫 Matikan fitur seleksi teks agar tidak bisa di-copy paste teksnya */
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}
 
body{
    min-height:100vh;
    overflow-x:hidden;
    background:
    linear-gradient(rgba(0,38,92,.9),rgba(0,90,180,.9)),
    url("https://i.ibb.co/Ps16jvyx/image.png");
    background-size:cover;
    background-position:center;
}
 
.flags{
    position:fixed;
    inset:0;
    opacity:.08;
    pointer-events:none;
    background-image:
    repeating-linear-gradient(
        45deg,
        transparent 0 50px,
        rgba(255,255,255,.15) 50px 100px
    );
}
 
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
    color:white;
    transition: filter 0.3s ease;
}

.content-blur {
    filter: blur(8px);
    pointer-events: none;
}
 
h1{
    font-size:48px;
    font-weight:800;
    text-shadow:0 0 30px #00bfff;
    letter-spacing: 2px;
}
 
.subtitle{
    margin-top:10px;
    opacity:.9;
    margin-bottom:35px;
}

.audio-control {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(13, 21, 37, 0.8);
    color: white;
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    padding: 10px 22px;
    border-radius: 50px;
    cursor: pointer;
    z-index: 9999;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
}

.audio-control:hover {
    background: rgba(0, 140, 255, 0.85);
    border-color: #00bfff;
    transform: translateY(-2px);
}
 
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:20px;
    padding: 10px;
}
 
.card{
    height:190px;
    perspective:1200px;
    cursor:pointer;
}

.card:hover:not(.flip) .card-inner {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,191,255,.6);
}
 
.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius:20px;
}
 
.card.flip .card-inner{
    transform:rotateY(180deg);
}
 
.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}
 
.front{
    background: #111;
    border: 2px solid rgba(255,255,255,.4);
    box-shadow: 0 0 20px rgba(0,191,255,.3);
    overflow: hidden;
}

.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
}
 
.back{
    background:white;
    color:#111;
    transform:rotateY(180deg);
    flex-direction:column;
    font-size:14px;
    font-weight:700;
    border: 3px solid #FFD700;
    padding: 10px;
}
 
.result{
    display:none;
    margin-top:35px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
 
.win{
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
    backdrop-filter:blur(12px);
    border: 2px solid gold;
    animation: glow 1s infinite alternate, fadeIn 0.5s ease;
}
 
@keyframes glow{
    from{ box-shadow:0 0 20px gold; }
    to{ box-shadow:0 0 50px gold; }
}
 
.reward{
    font-size:42px;
    font-weight:800;
    color:#FFD700;
    margin-top:10px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
 
.country{
    font-size:28px;
    margin-top:10px;
}
 
.play-again{
    display: inline-block;
    text-decoration: none;
    margin-top:25px;
    padding:14px 40px;
    border:none;
    border-radius:15px;
    background:#FFD700;
    color: #000;
    font-weight:800;
    cursor:pointer;
    font-size:16px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(255,215,0,0.4);
}

.play-again:hover {
    background: #fff;
    transform: scale(1.05);
}
 
.badge{
    display:inline-block;
    padding:10px 20px;
    background:#ffcc00;
    color:#000;
    border-radius:999px;
    font-weight:700;
    margin-bottom:10px;
}

.login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4, 12, 28, 0.85);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999999;
}

.login-box {
    background: linear-gradient(145deg, #0d1525, #070c16);
    border: 2px solid rgba(0, 191, 255, 0.4);
    box-shadow: 0 0 35px rgba(0, 191, 255, 0.3);
    padding: 40px 30px;
    border-radius: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    color: white;
    animation: fadeIn 0.4s ease;
}

.login-box h2 {
    font-size: 26px;
    font-weight: 800;
    color: #FFD700;
    margin-bottom: 5px;
    text-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.login-box p {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 25px;
}

.login-box input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 50px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    outline: none;
    margin-bottom: 20px;
    transition: all 0.3s;
}

.login-box input:focus {
    border-color: #00bfff;
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 15px rgba(0,191,255,0.4);
}

.login-box button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #00bfff, #0056b3);
    color: white;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,191,255,0.4);
    transition: 0.3s;
}

.login-box button:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 25px #00bfff;
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>🔐 VERIFIKASI MEMBER</h2>
        <p>Silakan masukkan User ID akun Anda untuk memulai klaim Lucky Flip Event</p>
        <input type="text" id="userIdInput" placeholder="Masukkan User ID Anda..." autocomplete="off">
        <button onclick="submitLogin()">Masuk Game ⚽</button>
    </div>
</div>

<button class="audio-control" id="musicBtn" onclick="toggleMusic()">
    🎵 Musik: MATI
</button>

<div class="flags"></div>
 
<div class="container content-blur" id="mainContainer">
     <div class="badge">🏆 WORLD CUP SPECIAL EVENT</div>
     <h1>SURAT4D</h1>
     <div class="subtitle">Pilih satu kartu bendera dan menangkan hadiah spesial hingga Rp1.000.000</div>
     <div class="cards" id="cards"></div>
     <div class="result" id="result"></div>
</div>
 
<audio id="bgMusic" loop preload="auto">
    <source src="https://mp3tourl.com/audio/1780966881633-875bc9bf-9af4-46da-a612-c8835fd856fd.mp3" type="audio/mpeg">
</audio>

<audio id="flipSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>
 
<audio id="winSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" type="audio/mpeg">
</audio>

<audio id="jackpotSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
</audio>
 
<script>
// 🔗 TARGET DIRECT SITUS UTAMA BAPAK
const TARGET_SITE_URL = "https://suratjujur.com/";

/* =======================================================
   🛡️ PROTEKSI SISTEM KEAMANAN (ANTI-INTIP & ANTI-F12)
   ======================================================= */
// 1. Matikan Klik Kanan
document.addEventListener('contextmenu', event => event.preventDefault());

// 2. Blokir Kombinasi Tombol F12, Ctrl+U, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+S
document.onkeydown = function(e) {
    if (e.keyCode == 123) { return false; } // F12
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } // Ctrl+Shift+J
    if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } // Ctrl+U
    if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) { return false; } // Ctrl+S
};

// 3. Jebakan Jika DevTools Terbuka Sengaja Lewat Menu Atas Browser
setInterval(function() {
    let before = new Date().getTime();
    debugger; // Membekukan browser jika inspect element menyala
    let after = new Date().getTime();
    if (after - before > 100) {
        // Jika ketahuan inspect element terbuka lama, paksa reload halaman
        window.location.reload();
    }
}, 1000);


/* =======================================================
   🎮 CORE GAME SCRIPT
   ======================================================= */
const rewards = [
    {country:"🇦🇷 Argentina",reward:"Rp25.000",weight:20},
    {country:"🇧🇷 Brasil",reward:"Rp50.000",weight:18},
    {country:"🇫🇷 Prancis",reward:"Rp30.000",weight:18},
    {country:"🇬🇧 Inggris",reward:"Rp20.000",weight:18},
    {country:"🇪🇸 Spanyol",reward:"Rp40.000",weight:15},
    {country:"🇩🇪 Jerman",reward:"Rp35.000",weight:15},
    {country:"🇵🇹 Portugal",reward:"Rp75.000",weight:10},
    {country:"🇳🇱 Belanda",reward:"Rp50.000",weight:10},
    {country:"🇧🇪 Belgia",reward:"Rp25.000",weight:10},
    {country:"🇭🇷 Kroasia",reward:"Rp30.000",weight:10},
    {country:"🇯🇵 Jepang",reward:"Rp50.000",weight:8},
    {country:"🇰🇷 Korea",reward:"Rp25.000",weight:8},
    {country:"🇨🇭 Swiss",reward:"Rp40.000",weight:7},
    {country:"🇺🇸 Amerika",reward:"Rp20.000",weight:7},
    {country:"🇲🇽 Meksiko",reward:"Rp15.000",weight:7},
    {country:"🇺🇾 Uruguay",reward:"Rp100.000",weight:5},
    {country:"⚽ Top Scorer",reward:"Rp150.000",weight:4},
    {country:"🥈 Runner Up",reward:"Rp250.000",weight:3},
    {country:"🏆 Champion",reward:"Rp500.000",weight:2},
    {country:"⭐ GOLDEN TROPHY",reward:"Rp1.000.000",weight:1}
];

const flagImages = [
    "https://flagcdn.com/w320/ar.png", "https://flagcdn.com/w320/br.png", 
    "https://flagcdn.com/w320/de.png", "https://flagcdn.com/w320/es.png", 
    "https://flagcdn.com/w320/fr.png", "https://flagcdn.com/w320/gb.png", 
    "https://flagcdn.com/w320/pt.png", "https://flagcdn.com/w320/nl.png", 
    "https://flagcdn.com/w320/be.png", "https://flagcdn.com/w320/hr.png", 
    "https://flagcdn.com/w320/jp.png", "https://flagcdn.com/w320/kr.png", 
    "https://flagcdn.com/w320/ch.png", "https://flagcdn.com/w320/us.png", 
    "https://flagcdn.com/w320/mx.png", "https://flagcdn.com/w320/uy.png", 
    "https://flagcdn.com/w320/it.png", "https://flagcdn.com/w320/ma.png", 
    "https://flagcdn.com/w320/sn.png", "https://flagcdn.com/w320/ca.png"
];

function shuffleArray(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

const shuffledFlags = shuffleArray([...flagImages]);
 
function weightedRandom(){
    const total=rewards.reduce((a,b)=>a+b.weight,0);
    let random=Math.random()*total;
    for(let item of rewards){
        if(random<item.weight) return item;
        random-=item.weight;
    }
}
 
const cards=document.getElementById("cards");
const result=document.getElementById("result");
const bgMusic=document.getElementById("bgMusic");
const musicBtn=document.getElementById("musicBtn");
const loginOverlay=document.getElementById("loginOverlay");
const mainContainer=document.getElementById("mainContainer");
const userIdInput=document.getElementById("userIdInput");

let played=false;
let isPlaying=false;
 
bgMusic.volume = 0.5;

// Proteksi Cek Status Pas Load Halaman
window.onload = () => {
    const savedStatus = localStorage.getItem("lucky_flip_status");
    if (savedStatus === "claimed") {
        const savedCountry = localStorage.getItem("lucky_flip_country");
        const savedReward = localStorage.getItem("lucky_flip_reward");
        
        loginOverlay.style.display = "none";
        mainContainer.classList.remove("content-blur");
        played = true;
        
        cards.style.display = "none";
        result.style.display = "block";
        if(savedReward === "Rp1.000.000") result.className = "result win";
        
        result.innerHTML = `
            <div style="background:rgba(255,0,0,0.2); padding:10px; border-radius:10px; font-size:12px; margin-bottom:15px; font-weight:700;">
                ⚠️ ANDA SUDAH PERNAH MENGIKUTI EVENT INI (1 ID = 1 KALI CLAIM)
            </div>
            <h2>🎉 HADIAH ANDA 🎉</h2>
            <div class="country">${savedCountry}</div>
            <div class="reward">${savedReward}</div>
            <p style="margin-top:10px; color:#fff; opacity:0.8;">Klik tombol di bawah jika Anda belum memproses klaim ke CS</p>
            <a href="${TARGET_SITE_URL}" target="_blank" class="play-again">Claim Sekarang</a>
        `;
    }
};

function submitLogin() {
    const userIdValue = userIdInput.value.trim().toLowerCase();
    if(userIdValue === "") {
        alert("Harap masukkan User ID Anda terlebih dahulu pak!");
        return;
    }
    
    const oldUser = localStorage.getItem("lucky_flip_userid");
    if(oldUser && oldUser === userIdValue) {
        alert("User ID ini sudah pernah melakukan klaim hadiah!");
        localStorage.setItem("lucky_flip_status", "claimed");
        location.reload();
        return;
    }
    
    loginOverlay.style.display = "none";
    mainContainer.classList.remove("content-blur");
    toggleMusic();
}

function toggleMusic() {
    if (!isPlaying) {
        bgMusic.play().then(() => {
            musicBtn.innerHTML = "🎵 Musik: NYALA";
            isPlaying = true;
        }).catch(e => { console.log("Audio play error:", e); });
    } else {
        bgMusic.pause();
        musicBtn.innerHTML = "🎵 Musik: MATI";
        isPlaying = false;
    }
}
 
for(let i=0;i<20;i++){
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML = `
        <div class="card-inner">
            <div class="front">
                <img src="${shuffledFlags[i]}" alt="Bendera Negara">
            </div>
            <div class="back">🏆<br>Kartu Dibuka</div>
        </div>
    `;
 
    card.onclick=()=>{
        if(played) return;
        played=true;
 
        const flipSoundClone = document.getElementById("flipSound").cloneNode(true);
        flipSoundClone.volume = 0.7;
        flipSoundClone.play().catch(()=>{});
 
        const hadiah=weightedRandom();
        card.classList.add("flip");
 
        const currentUser = userIdInput.value.trim().toLowerCase();
        localStorage.setItem("lucky_flip_status", "claimed");
        localStorage.setItem("lucky_flip_userid", currentUser);
        localStorage.setItem("lucky_flip_country", hadiah.country);
        localStorage.setItem("lucky_flip_reward", hadiah.reward);
 
        setTimeout(()=>{
            const jackpot = hadiah.reward === "Rp1.000.000";
            
            if(jackpot) {
                const jackpotSound = document.getElementById("jackpotSound").cloneNode(true);
                jackpotSound.play().catch(()=>{});
                let duration = 3 * 1000;
                let end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) { requestAnimationFrame(frame); }
                }());
            } else {
                const winSoundClone = document.getElementById("winSound").cloneNode(true);
                winSoundClone.play().catch(()=>{});
                confetti({ particleCount:150, spread:100, origin:{y:.6} });
            }
 
            result.style.display="block";
            result.className = jackpot ? "result win" : "result";
            
            result.innerHTML=`
                <h2>🎉 SELAMAT 🎉</h2>
                <div class="country">${hadiah.country}</div>
                <div class="reward">${hadiah.reward}</div>
                <p style="margin-top:10px; color:#fff; opacity:0.8;">Hadiah berhasil dikunci untuk User ID Anda</p>
                <a href="${TARGET_SITE_URL}" target="_blank" class="play-again">Claim Sekarang</a>
            `;
 
            window.scrollTo({ top:document.body.scrollHeight, behavior:'smooth' });
        }, 600);
    };
 
    cards.appendChild(card);
}
</script>
 
</body>
</html>
